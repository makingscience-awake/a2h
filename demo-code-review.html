<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2H Demo — AI Code Review Pipeline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid #21262d}
.header h1{font-size:18px;color:#f0f6fc}.header h1 span{color:#8b949e;font-weight:400;font-size:13px}
.stats{display:flex;gap:16px}.stat{text-align:center}.stat .n{font-size:20px;font-weight:800}.stat .l{font-size:9px;color:#484f58;text-transform:uppercase;letter-spacing:1px}
.s1 .n{color:#58a6ff}.s2 .n{color:#3fb950}.s3 .n{color:#e3b341}.s4 .n{color:#f85149}

.main{display:grid;grid-template-columns:260px 1fr 280px;height:calc(100vh - 48px)}
.panel{border-right:1px solid #21262d;padding:10px;overflow-y:auto}
.panel:last-child{border-right:none;border-left:1px solid #21262d}
.panel h3{font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px}

/* PR list */
.pr{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 10px;margin:4px 0;cursor:pointer;transition:border-color 0.15s}
.pr:hover,.pr.active{border-color:#58a6ff}
.pr .pr-title{font-weight:700;color:#f0f6fc;font-size:12px}
.pr .pr-meta{font-size:10px;color:#8b949e;margin-top:2px}
.pr .pr-status{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;margin-top:3px}
.st-reviewing{background:#2a2517;color:#e3b341}
.st-flagged{background:#3a1a1a;color:#f85149}
.st-approved{background:#1a3a2a;color:#3fb950}
.st-merged{background:#1c2941;color:#58a6ff}

/* Review detail */
.review{background:#161b22;border:1px solid #30363d;border-radius:10px;margin:6px 0;overflow:hidden;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.review-header{padding:10px 12px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center}
.review-header .file{color:#58a6ff;font-family:'SF Mono',monospace;font-size:11px}
.severity{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600}
.sev-critical{background:#3a1a1a;color:#f85149}
.sev-high{background:#2a1f17;color:#f0883e}
.sev-medium{background:#2a2517;color:#e3b341}
.sev-low{background:#1c2230;color:#8b949e}
.sev-style{background:#1c2941;color:#58a6ff}

.diff{background:#0d1117;padding:8px 12px;font-family:'SF Mono',monospace;font-size:11px;line-height:1.6;overflow-x:auto}
.diff .del{color:#f85149;background:#3a1a1a22}
.diff .add{color:#3fb950;background:#1a3a2a22}
.diff .line-num{color:#484f58;user-select:none;margin-right:8px;display:inline-block;width:20px;text-align:right}

.finding{padding:10px 12px;border-top:1px solid #21262d}
.finding .msg{font-size:12px;color:#f0f6fc;margin-bottom:4px}
.finding .explain{font-size:11px;color:#8b949e;line-height:1.4}
.finding .suggestion{background:#1f2a22;border:1px solid #3fb950;border-radius:6px;padding:6px 8px;margin:6px 0;font-size:11px;color:#3fb950}

/* A2H badge */
.a2h-badge{background:#2a1f33;border:1px solid #8957e5;border-radius:6px;padding:6px 8px;margin:6px 0;font-size:10px;color:#bc8cff}
.auto-badge{background:#2a2517;border:1px solid #d29922;border-radius:6px;padding:6px 8px;margin:6px 0;font-size:10px;color:#e3b341}

.actions{padding:8px 12px;border-top:1px solid #21262d;display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:5px 12px;border-radius:5px;border:none;font-size:10px;font-weight:600;cursor:pointer}
.btn-approve{background:#238636;color:#fff}
.btn-reject{background:#da3633;color:#fff}
.btn-fix{background:#1f6feb;color:#fff}
.btn-ghost{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn:hover{opacity:0.85}
.resolved{opacity:0.5}
.resolved .actions{display:none}

/* Right panel */
.agent-card{background:#1f2a22;border:1px solid #3fb950;border-radius:6px;padding:6px 8px;margin:3px 0;font-size:10px}
.agent-card .an{color:#3fb950;font-weight:600}
.reviewer{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:8px;margin:3px 0;font-size:11px}
.reviewer .rn{font-weight:700;color:#f0f6fc}
.reviewer .rr{color:#8b949e;font-size:10px}

.log{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:6px;overflow-y:auto;font-family:'SF Mono',monospace;font-size:9px;flex:1;min-height:80px}
.log-e{padding:1px 0;color:#484f58}.log-e .a{font-weight:600}
.a-scan{color:#58a6ff}.a-auto{color:#e3b341}.a-flag{color:#f85149}.a-ok{color:#3fb950}.a-esc{color:#bc8cff}.a-a2h{color:#bc8cff}
</style>
</head>
<body>
<div class="header">
  <h1>Code Review <span>— A2H Security Escalation</span></h1>
  <div class="stats">
    <div class="stat s1"><div class="n" id="s-prs">0</div><div class="l">PRs Reviewed</div></div>
    <div class="stat s2"><div class="n" id="s-auto">0</div><div class="l">Auto-Approved</div></div>
    <div class="stat s3"><div class="n" id="s-pending">0</div><div class="l">Needs Human</div></div>
    <div class="stat s4"><div class="n" id="s-sec">0</div><div class="l">Security Issues</div></div>
  </div>
</div>
<div class="main">
  <div class="panel">
    <h3>Pull Requests</h3>
    <div id="pr-list"></div>
  </div>
  <div class="panel" style="border-right:none;padding:10px 14px">
    <h3>Review Findings</h3>
    <div id="findings"></div>
  </div>
  <div class="panel" style="display:flex;flex-direction:column">
    <h3>AI Agents</h3>
    <div id="agents"></div>
    <h3>Human Reviewers</h3>
    <div id="reviewers"></div>
    <h3>Log</h3>
    <div class="log" id="log"></div>
  </div>
</div>
<script>
let prCount=0,autoCount=0,pendingCount=0,secCount=0;
const reviewers=[
  {name:'Alice Chen',role:'Senior Engineer',reviews:0},
  {name:'Marcus Webb',role:'Security Lead',reviews:0},
  {name:'Priya Kapoor',role:'Tech Lead',reviews:0},
];

const prs=[
  {title:'Fix typo in README',author:'@intern',files:1,additions:1,deletions:1,findings:[
    {file:'README.md',severity:'style',msg:'Minor typo fix',explain:'Corrected spelling of "authentication".',auto:true}
  ]},
  {title:'Add user search endpoint',author:'@backend-dev',files:3,additions:45,deletions:2,findings:[
    {file:'api/users.py',severity:'critical',msg:'SQL Injection vulnerability',explain:'User input concatenated directly into SQL query. An attacker could execute arbitrary SQL.',
     diff:'- query = f"SELECT * FROM users WHERE name = \'{name}\'"\n+ query = "SELECT * FROM users WHERE name = %s"',
     suggestion:'Use parameterized queries: cursor.execute("SELECT * FROM users WHERE name = %s", (name,))',
     escalate:'Security Lead'},
    {file:'api/users.py',severity:'medium',msg:'Missing input validation',explain:'No length check on search term. Could be used for DoS with very long strings.',
     diff:'+ if len(name) > 100:\n+     raise ValueError("Search term too long")',auto:false}
  ]},
  {title:'Update payment processing',author:'@payments-team',files:5,additions:120,deletions:30,findings:[
    {file:'payments/stripe.py',severity:'high',msg:'API key exposed in code',explain:'Stripe secret key hardcoded on line 14. Should use environment variable.',
     diff:'- stripe.api_key = "sk_live_abc123..."\n+ stripe.api_key = os.environ["STRIPE_SECRET_KEY"]',
     suggestion:'Move to environment variable and rotate the exposed key immediately.',
     escalate:'Security Lead'},
    {file:'payments/webhook.py',severity:'medium',msg:'Missing webhook signature verification',explain:'Incoming webhooks not verified. Could accept forged payment confirmations.',auto:false},
    {file:'payments/models.py',severity:'style',msg:'Unused import',explain:'`import json` on line 3 is never used.',auto:true},
  ]},
  {title:'Refactor config loading',author:'@devops',files:2,additions:30,deletions:25,findings:[
    {file:'config/loader.py',severity:'low',msg:'Consider using dataclass',explain:'Config dict could be a typed dataclass for better IDE support.',auto:true},
    {file:'config/loader.py',severity:'style',msg:'Line too long (112 chars)',explain:'PEP 8 recommends 79-100 characters.',auto:true}
  ]},
  {title:'Add admin delete endpoint',author:'@senior-dev',files:2,additions:25,deletions:0,findings:[
    {file:'api/admin.py',severity:'critical',msg:'No authentication check',explain:'Delete endpoint accessible without admin auth. Any user could delete records.',
     diff:'+ @require_admin\n  def delete_user(user_id):\n-     db.delete(user_id)\n+     if not current_user.is_admin:\n+         raise Forbidden()',
     suggestion:'Add @require_admin decorator and verify permissions before destructive operations.',
     escalate:'Tech Lead'},
    {file:'api/admin.py',severity:'high',msg:'No soft delete',explain:'Hard delete removes data permanently. Use soft delete for audit trail.',auto:false}
  ]},
];

function log(a,d,c=''){const t=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('log').innerHTML+=`<div class="log-e"><span style="color:#30363d">${t}</span> <span class="a a-${c}">[${a}]</span> ${d}</div>`;document.getElementById('log').scrollTop=9999;}
function updateStats(){document.getElementById('s-prs').textContent=prCount;document.getElementById('s-auto').textContent=autoCount;document.getElementById('s-pending').textContent=pendingCount;document.getElementById('s-sec').textContent=secCount;}
function renderReviewers(){document.getElementById('reviewers').innerHTML=reviewers.map(r=>`<div class="reviewer"><div class="rn">${r.name}</div><div class="rr">${r.role} · ${r.reviews} reviews</div></div>`).join('');}
function renderAgents(){document.getElementById('agents').innerHTML=['Code Scanner','Security Analyzer','Style Checker'].map(a=>`<div class="agent-card"><span class="an">🤖 ${a}</span></div>`).join('');}

function processPR(pr,idx){
  prCount++;
  const prId=`pr-${idx}`;
  const hasSec=pr.findings.some(f=>f.severity==='critical'||f.severity==='high');
  const allAuto=pr.findings.every(f=>f.auto);
  const status=allAuto?'approved':hasSec?'flagged':'reviewing';
  if(allAuto) autoCount++;
  if(hasSec) secCount++;
  if(!allAuto) pendingCount++;

  // Add PR to list
  document.getElementById('pr-list').innerHTML+=`<div class="pr ${status==='flagged'?'active':''}" id="${prId}" onclick="showPR(${idx})">
    <div class="pr-title">${pr.title}</div>
    <div class="pr-meta">${pr.author} · ${pr.files} files · +${pr.additions} -${pr.deletions}</div>
    <span class="pr-status st-${status}">${status}</span>
  </div>`;

  log('scan',`PR "${pr.title}" — ${pr.findings.length} findings`,allAuto?'auto':hasSec?'flag':'scan');

  if(allAuto) log('auto',`All findings auto-resolved → auto-approved`,'auto');
  if(hasSec) log('flag',`Security issues detected → escalating to human`,'flag');

  updateStats();
  if(status==='flagged') showPR(idx);
}

function showPR(idx){
  const pr=prs[idx];
  const el=document.getElementById('findings');
  el.innerHTML='';

  pr.findings.forEach((f,fi)=>{
    const fId=`f-${idx}-${fi}`;
    let diffHtml='';
    if(f.diff){
      diffHtml=`<div class="diff">${f.diff.split('\n').map((l,i)=>{
        const cls=l.startsWith('-')?'del':l.startsWith('+')?'add':'';
        return `<div class="${cls}"><span class="line-num">${i+1}</span>${l.replace(/</g,'&lt;')}</div>`;
      }).join('')}</div>`;
    }

    let a2hHtml='';
    if(f.escalate){
      a2hHtml=`<div class="a2h-badge">🔒 A2H Escalated → <strong>${f.escalate}</strong><br><small>Security findings require human review per policy</small></div>`;
    } else if(f.auto){
      a2hHtml=`<div class="auto-badge">🤖 Auto-resolved — no human action needed</div>`;
    }

    let actionsHtml='';
    if(!f.auto){
      actionsHtml=`<div class="actions" id="actions-${fId}">
        <button class="btn btn-approve" onclick="resolveFinding('${fId}','approved')">✅ Approve Fix</button>
        <button class="btn btn-fix" onclick="resolveFinding('${fId}','apply-suggestion')">🔧 Apply Suggestion</button>
        <button class="btn btn-reject" onclick="resolveFinding('${fId}','request-changes')">↩️ Request Changes</button>
        <button class="btn btn-ghost" onclick="resolveFinding('${fId}','dismiss')">Dismiss</button>
      </div>`;
    }

    el.innerHTML+=`<div class="review" id="${fId}">
      <div class="review-header">
        <span class="file">${f.file}</span>
        <span class="severity sev-${f.severity}">${f.severity}</span>
      </div>
      ${diffHtml}
      <div class="finding">
        <div class="msg">${f.msg}</div>
        <div class="explain">${f.explain}</div>
        ${f.suggestion?`<div class="suggestion">💡 Suggestion: ${f.suggestion}</div>`:''}
        ${a2hHtml}
      </div>
      ${actionsHtml}
    </div>`;

    if(f.escalate) log('a2h',`AI Scanner → ${f.escalate}: "${f.msg}"`, 'a2h');
  });
}

function resolveFinding(fId,action){
  const el=document.getElementById(fId);
  if(el){
    el.classList.add('resolved');
    const actions=document.getElementById(`actions-${fId}`);
    if(actions) actions.innerHTML=`<span style="color:#3fb950;font-size:10px;font-weight:600">✓ ${action}</span>`;
  }
  pendingCount=Math.max(0,pendingCount-1);
  reviewers[Math.floor(Math.random()*3)].reviews++;
  updateStats();renderReviewers();
  log('ok',`Finding ${action}: ${fId}`,'ok');
}

// Init
renderAgents();renderReviewers();
prs.forEach((pr,i)=>setTimeout(()=>processPR(pr,i),i*2000));
</script>
</body>
</html>
