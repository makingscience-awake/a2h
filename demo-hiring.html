<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2H Demo — Hiring Pipeline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid #21262d}.header h1{font-size:18px;color:#f0f6fc}.header h1 span{color:#8b949e;font-weight:400;font-size:13px}
.stats{display:flex;gap:16px}.stat{text-align:center}.stat .n{font-size:20px;font-weight:800}.stat .l{font-size:9px;color:#484f58;text-transform:uppercase;letter-spacing:1px}
.main{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;height:calc(100vh - 48px);overflow:hidden}
.col{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:8px;overflow-y:auto;display:flex;flex-direction:column}
.col-title{font-size:11px;color:#484f58;text-transform:uppercase;letter-spacing:1px;text-align:center;padding:4px;border-bottom:1px solid #21262d;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.col-title .cnt{background:#30363d;padding:1px 6px;border-radius:8px;font-size:10px;color:#c9d1d9}
.card{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:8px;margin:4px 0;font-size:11px;animation:fadeIn 0.3s;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:#58a6ff}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card .name{font-weight:700;color:#f0f6fc;font-size:12px}.card .role{color:#8b949e;font-size:10px}
.card .score-bar{height:6px;background:#30363d;border-radius:3px;margin:4px 0;overflow:hidden}
.card .score-fill{height:100%;border-radius:3px}
.card .tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.tag{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:600}
.tag-match{background:#1a3a2a;color:#3fb950}.tag-miss{background:#3a1a1a;color:#f85149}.tag-info{background:#1c2941;color:#58a6ff}

.a2h-panel{background:#2a1f33;border:1px solid #8957e5;border-radius:8px;padding:8px;margin:4px 0;font-size:10px}
.a2h-panel .from{color:#3fb950;font-size:9px;margin-bottom:3px}
.a2h-panel .q{color:#f0f6fc;font-weight:600;margin-bottom:4px}
.a2h-panel .ctx{background:#0d1117;padding:4px 6px;border-radius:4px;margin:3px 0;color:#8b949e;font-size:9px}
.btn{padding:4px 10px;border-radius:4px;border:none;font-size:9px;font-weight:600;cursor:pointer;margin:2px}
.btn-yes{background:#238636;color:#fff}.btn-no{background:#da3633;color:#fff}.btn-maybe{background:#1f6feb;color:#fff}.btn-ghost{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn:hover{opacity:0.85}
.auto-tag{background:#2a2517;color:#e3b341;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;display:inline-block;margin:3px 0}
.resolved{opacity:0.4}
</style>
</head>
<body>
<div class="header">
  <h1>Hiring Pipeline <span>— A2H Candidate Screening</span></h1>
  <div class="stats">
    <div class="stat"><div class="n" id="s1" style="color:#58a6ff">0</div><div class="l">Applied</div></div>
    <div class="stat"><div class="n" id="s2" style="color:#e3b341">0</div><div class="l">AI Screened</div></div>
    <div class="stat"><div class="n" id="s3" style="color:#3fb950">0</div><div class="l">Interviewing</div></div>
    <div class="stat"><div class="n" id="s4" style="color:#bc8cff">0</div><div class="l">Offers</div></div>
  </div>
</div>
<div class="main">
  <div class="col" id="col-applied"><div class="col-title">Applied <span class="cnt" id="cnt-0">0</span></div></div>
  <div class="col" id="col-screening"><div class="col-title">AI Screening <span class="cnt" id="cnt-1">0</span></div></div>
  <div class="col" id="col-review"><div class="col-title">Manager Review <span class="cnt" id="cnt-2">0</span></div></div>
  <div class="col" id="col-interview"><div class="col-title">Interview <span class="cnt" id="cnt-3">0</span></div></div>
  <div class="col" id="col-offer"><div class="col-title">Offer / Reject <span class="cnt" id="cnt-4">0</span></div></div>
</div>
<script>
const candidates=[
  {name:'Sarah Chen',role:'Senior Engineer',exp:5,skills:['Python','React','AWS'],score:92,salary:'$160K',match:['Python','AWS'],miss:[],decision:'interview'},
  {name:'Mike Johnson',role:'Junior Developer',exp:1,skills:['JavaScript','HTML'],score:45,salary:'$70K',match:['JavaScript'],miss:['Python','AWS'],decision:'auto_reject'},
  {name:'Priya Patel',role:'Staff Engineer',exp:8,skills:['Python','Go','K8s','AWS'],score:95,salary:'$200K',match:['Python','AWS','K8s'],miss:[],decision:'interview',vp:true},
  {name:'James Wright',role:'Mid-Level Developer',exp:3,skills:['Java','Spring','Docker'],score:68,salary:'$120K',match:['Docker'],miss:['Python'],decision:'maybe'},
  {name:'Ana Rodriguez',role:'DevOps Engineer',exp:4,skills:['Terraform','AWS','Python','Docker'],score:88,salary:'$150K',match:['Python','AWS','Docker'],miss:[],decision:'interview'},
  {name:'Tom Liu',role:'Intern',exp:0,skills:['Python basics'],score:30,salary:'$50K',match:[],miss:['Python','AWS','React'],decision:'auto_reject'},
  {name:'Elena Vogt',role:'Senior Engineer',exp:6,skills:['Rust','Go','Python'],score:78,salary:'$170K',match:['Python'],miss:['AWS'],decision:'maybe'},
  {name:'David Kim',role:'Principal Engineer',exp:12,skills:['Python','Architecture','AWS','Leadership'],score:98,salary:'$250K',match:['Python','AWS','Leadership'],miss:[],decision:'interview',vp:true},
];

let applied=0,screened=0,interviewing=0,offers=0;
const counts=[0,0,0,0,0];

function updateCounts(){
  document.getElementById('s1').textContent=applied;
  document.getElementById('s2').textContent=screened;
  document.getElementById('s3').textContent=interviewing;
  document.getElementById('s4').textContent=offers;
  counts.forEach((c,i)=>document.getElementById(`cnt-${i}`).textContent=c);
}

function scoreColor(s){return s>=80?'#3fb950':s>=60?'#e3b341':'#f85149';}

function addCard(colId,c,extra=''){
  const col=document.getElementById(colId);
  const tags=c.match.map(t=>`<span class="tag tag-match">✓ ${t}</span>`).join('')+c.miss.map(t=>`<span class="tag tag-miss">✗ ${t}</span>`).join('');
  col.innerHTML+=`<div class="card" id="c-${c.name.replace(/\s/g,'-')}">
    <div class="name">${c.name}</div>
    <div class="role">${c.role} · ${c.exp}yr · ${c.salary}</div>
    <div style="font-size:10px;color:${scoreColor(c.score)}">Match: ${c.score}%</div>
    <div class="score-bar"><div class="score-fill" style="width:${c.score}%;background:${scoreColor(c.score)}"></div></div>
    <div class="tags">${tags}</div>
    ${extra}
  </div>`;
}

function processCandidate(c,idx){
  applied++;counts[0]++;updateCounts();
  addCard('col-applied',c);

  setTimeout(()=>{
    // Move to screening
    const el=document.getElementById(`c-${c.name.replace(/\s/g,'-')}`);
    if(el)el.remove();counts[0]--;counts[1]++;screened++;updateCounts();

    if(c.decision==='auto_reject'){
      addCard('col-screening',c,`<div class="auto-tag">🤖 Auto-rejected: score ${c.score}% < 50% threshold</div>`);
      setTimeout(()=>{
        const el2=document.getElementById(`c-${c.name.replace(/\s/g,'-')}`);
        if(el2){el2.classList.add('resolved');counts[1]--;counts[4]++;updateCounts();}
      },2000);
    } else if(c.decision==='interview'){
      addCard('col-screening',c,`<span class="tag tag-match" style="margin-top:4px">Score ${c.score}% → recommend interview</span>`);
      setTimeout(()=>{
        const el2=document.getElementById(`c-${c.name.replace(/\s/g,'-')}`);
        if(el2)el2.remove();counts[1]--;counts[2]++;updateCounts();

        // A2H to manager
        const reviewer=c.vp?'VP Engineering':'Hiring Manager';
        const a2h=`<div class="a2h-panel">
          <div class="from">🤖 Screening Agent → 👤 ${reviewer}</div>
          <div class="q">${c.vp?'VP-level hire: ':''}Schedule interview with ${c.name}?</div>
          <div class="ctx">Match: ${c.score}% · ${c.exp}yr exp · Salary: ${c.salary}<br>Skills: ${c.skills.join(', ')}</div>
          <div style="margin-top:4px">
            <button class="btn btn-yes" onclick="decide('${c.name.replace(/\s/g,'-')}','interview')">📅 Schedule</button>
            <button class="btn btn-maybe" onclick="decide('${c.name.replace(/\s/g,'-')}','hold')">⏸ Hold</button>
            <button class="btn btn-no" onclick="decide('${c.name.replace(/\s/g,'-')}','pass')">Pass</button>
          </div>
          ${c.vp?'<div style="color:#bc8cff;font-size:9px;margin-top:3px">⬆️ VP-level: escalated to VP Engineering</div>':''}
        </div>`;
        addCard('col-review',c,a2h);
      },2500);
    } else {
      addCard('col-screening',c,`<span class="tag tag-info">Score ${c.score}% — borderline, needs review</span>`);
      setTimeout(()=>{
        const el2=document.getElementById(`c-${c.name.replace(/\s/g,'-')}`);
        if(el2)el2.remove();counts[1]--;counts[2]++;updateCounts();
        const a2h=`<div class="a2h-panel">
          <div class="from">🤖 Screening Agent → 👤 Hiring Manager</div>
          <div class="q">Borderline candidate — proceed with ${c.name}?</div>
          <div class="ctx">Match: ${c.score}% · Missing: ${c.miss.join(', ')||'none'}</div>
          <div style="margin-top:4px">
            <button class="btn btn-yes" onclick="decide('${c.name.replace(/\s/g,'-')}','interview')">📅 Interview</button>
            <button class="btn btn-no" onclick="decide('${c.name.replace(/\s/g,'-')}','pass')">Pass</button>
          </div>
        </div>`;
        addCard('col-review',c,a2h);
      },2500);
    }
  },1500+idx*500);
}

function decide(nameId,action){
  const el=document.getElementById(`c-${nameId}`);
  if(!el)return;
  el.classList.add('resolved');
  const panel=el.querySelector('.a2h-panel');
  if(panel)panel.innerHTML=`<span style="color:${action==='interview'?'#3fb950':'#f85149'};font-weight:600">✓ ${action}</span>`;
  counts[2]--;
  if(action==='interview'){counts[3]++;interviewing++;}
  else{counts[4]++;}
  updateCounts();
}

candidates.forEach((c,i)=>setTimeout(()=>processCandidate(c,i),i*3000));
</script>
</body>
</html>
