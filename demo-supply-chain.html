<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2H Demo — Supply Chain Disruption</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid #21262d}.header h1{font-size:18px;color:#f0f6fc}.header h1 span{color:#8b949e;font-weight:400;font-size:13px}
.main{display:grid;grid-template-columns:300px 1fr 280px;height:calc(100vh - 48px)}
.panel{padding:10px;overflow-y:auto;border-right:1px solid #21262d}.panel:last-child{border:none;background:#161b22}
.panel h3{font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px}

.supplier{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 10px;margin:4px 0;font-size:11px}
.supplier .sname{font-weight:700;color:#f0f6fc;font-size:12px}.supplier .smeta{color:#8b949e;font-size:10px}
.supplier .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.dot-ok{background:#3fb950}.dot-delayed{background:#e3b341}.dot-disrupted{background:#f85149}
.inv-bar{height:6px;background:#30363d;border-radius:3px;margin:4px 0;overflow:hidden}
.inv-fill{height:100%;border-radius:3px;transition:width 1s}

.disruption{background:#161b22;border:2px solid #f85149;border-radius:10px;padding:12px;margin:8px 0;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.disruption .dtype{color:#f85149;font-weight:700;font-size:13px;margin-bottom:4px}
.disruption .dmsg{font-size:12px;color:#f0f6fc;margin-bottom:6px}

.option-card{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:8px;margin:4px 0;cursor:pointer;transition:border-color 0.15s}
.option-card:hover{border-color:#58a6ff}
.option-card .oname{font-weight:600;color:#f0f6fc;font-size:12px}
.option-card .odetail{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px;font-size:10px}
.odetail .od{text-align:center;background:#0d1117;border-radius:4px;padding:3px}.odetail .odl{color:#484f58;font-size:8px}.odetail .odv{font-weight:700}

.a2h-box{background:#2a1f33;border:1px solid #8957e5;border-radius:6px;padding:6px 8px;margin:4px 0;font-size:10px;color:#bc8cff}
.btn{padding:5px 12px;border-radius:5px;border:none;font-size:10px;font-weight:600;cursor:pointer;margin:2px}
.btn-select{background:#1f6feb;color:#fff}.btn-ghost{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn:hover{opacity:0.85}
.selected{border-color:#238636;background:#1a3a2a22}
.selected .oname::after{content:' ✓ Selected';color:#3fb950;font-size:10px}

.timeline{font-size:10px;margin:3px 0;padding:3px 0;border-bottom:1px solid #21262d;color:#8b949e}
.timeline .tt{color:#484f58;font-size:9px}
</style>
</head>
<body>
<div class="header">
  <h1>Supply Chain <span>— Disruption Response + Option Analysis</span></h1>
</div>
<div class="main">
  <div class="panel">
    <h3>Suppliers</h3>
    <div id="suppliers"></div>
    <h3>Inventory Levels</h3>
    <div id="inventory"></div>
  </div>
  <div class="panel" style="border-right:none">
    <h3>Disruptions & Decisions</h3>
    <div id="disruptions"></div>
  </div>
  <div class="panel">
    <h3>Procurement Team</h3>
    <div id="team"></div>
    <h3>Timeline</h3>
    <div id="timeline"></div>
  </div>
</div>
<script>
const suppliers=[
  {name:'TechParts Co',product:'Microchips',status:'ok',lead:'4 weeks',inventory:85},
  {name:'SteelWorks Ltd',product:'Steel frames',status:'ok',lead:'2 weeks',inventory:60},
  {name:'PackagePlus',product:'Packaging',status:'ok',lead:'1 week',inventory:90},
  {name:'ChemSupply',product:'Solvents',status:'ok',lead:'3 weeks',inventory:45},
  {name:'LogiFreight',product:'Shipping (Asia)',status:'ok',lead:'6 weeks',inventory:100},
];

const disruptions=[
  {type:'SUPPLIER DELAY',supplier:'TechParts Co',product:'Microchips',msg:'Factory fire at TechParts primary facility. Production halted for estimated 6 weeks.',
   impact:'Production line stops in 3 weeks without microchips',
   options:[
     {name:'Option A: Wait for TechParts',cost:'$0',delay:'6 weeks',risk:'High — production stops',color:'#f85149'},
     {name:'Option B: Switch to ChipMax (alt supplier)',cost:'+$45K premium',delay:'On time',risk:'Low — qualified backup',color:'#3fb950'},
     {name:'Option C: Split order',cost:'+$22K premium',delay:'2 weeks',risk:'Medium — partial coverage',color:'#e3b341'},
   ]},
  {type:'PORT CONGESTION',supplier:'LogiFreight',product:'Shipping (Asia)',msg:'Shanghai port congestion — average delay 3 weeks for outbound containers.',
   impact:'Q3 inventory replenishment delayed. Stockout risk for 4 SKUs.',
   options:[
     {name:'Option A: Wait for port clearance',cost:'$0',delay:'3 weeks',risk:'Medium — stockout likely',color:'#e3b341'},
     {name:'Option B: Air freight critical items',cost:'+$85K',delay:'On time',risk:'Low — guaranteed delivery',color:'#3fb950'},
     {name:'Option C: Reroute via Vietnam port',cost:'+$15K',delay:'1 week',risk:'Low — tested route',color:'#3fb950'},
   ]},
  {type:'QUALITY ISSUE',supplier:'ChemSupply',product:'Solvents',msg:'Batch #4521 failed quality inspection — contamination detected. Entire shipment rejected.',
   impact:'2 weeks of solvent supply at risk. No safety stock.',
   options:[
     {name:'Option A: Request replacement batch',cost:'$0 (warranty)',delay:'3 weeks',risk:'Medium — no stock meanwhile',color:'#e3b341'},
     {name:'Option B: Source from EmergChem',cost:'+$12K',delay:'3 days',risk:'Low — emergency supplier',color:'#3fb950'},
   ]},
];

function renderSuppliers(){
  document.getElementById('suppliers').innerHTML=suppliers.map(s=>`<div class="supplier">
    <div class="sname"><span class="dot dot-${s.status}"></span>${s.name}</div>
    <div class="smeta">${s.product} · Lead: ${s.lead}</div>
  </div>`).join('');
  document.getElementById('inventory').innerHTML=suppliers.map(s=>{
    const c=s.inventory>70?'#3fb950':s.inventory>40?'#e3b341':'#f85149';
    return `<div style="margin:4px 0;font-size:10px"><span>${s.product}</span><span style="float:right;color:${c}">${s.inventory}%</span><div class="inv-bar"><div class="inv-fill" style="width:${s.inventory}%;background:${c}"></div></div></div>`;
  }).join('');
}

function addTimeline(msg){
  const t=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('timeline').innerHTML+=`<div class="timeline"><span class="tt">${t}</span> ${msg}</div>`;
}

function renderTeam(){
  document.getElementById('team').innerHTML=[
    {name:'Rachel Torres',role:'Procurement Director'},
    {name:'David Kim',role:'Supply Chain Manager'},
  ].map(t=>`<div style="background:#21262d;border:1px solid #30363d;border-radius:6px;padding:6px 8px;margin:3px 0;font-size:11px"><div style="font-weight:700;color:#f0f6fc">${t.name}</div><div style="color:#8b949e;font-size:10px">${t.role}</div></div>`).join('');
}

function showDisruption(d,idx){
  const sup=suppliers.find(s=>s.name===d.supplier);
  if(sup){sup.status=d.type==='QUALITY ISSUE'?'disrupted':'delayed';sup.inventory=Math.max(10,sup.inventory-30);}
  renderSuppliers();

  const optionsHtml=d.options.map((o,oi)=>`
    <div class="option-card" id="opt-${idx}-${oi}" onclick="selectOption(${idx},${oi})">
      <div class="oname">${o.name}</div>
      <div class="odetail">
        <div class="od"><div class="odl">Cost</div><div class="odv" style="color:${o.cost==='$0'||o.cost==='$0 (warranty)'?'#3fb950':'#e3b341'}">${o.cost}</div></div>
        <div class="od"><div class="odl">Delay</div><div class="odv" style="color:${o.delay==='On time'?'#3fb950':'#e3b341'}">${o.delay}</div></div>
        <div class="od"><div class="odl">Risk</div><div class="odv" style="color:${o.color}">${o.risk.split(' — ')[0]}</div></div>
      </div>
    </div>`).join('');

  document.getElementById('disruptions').innerHTML+=`<div class="disruption">
    <div class="dtype">⚠️ ${d.type}</div>
    <div class="dmsg">${d.msg}</div>
    <div style="font-size:10px;color:#e3b341;margin:4px 0">Impact: ${d.impact}</div>
    <div class="a2h-box">🤖 Supply Chain Agent → 👤 Procurement Director<br><small>Multiple options analyzed — human decision required</small></div>
    <div style="margin-top:6px">${optionsHtml}</div>
  </div>`;

  addTimeline(`🚨 ${d.type}: ${d.supplier} — ${d.product}`);
}

function selectOption(dIdx,oIdx){
  const d=disruptions[dIdx];const o=d.options[oIdx];
  document.querySelectorAll(`[id^="opt-${dIdx}"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt-${dIdx}-${oIdx}`).classList.add('selected');
  addTimeline(`✅ Decision: ${o.name} (${o.cost}, ${o.delay})`);
}

renderSuppliers();renderTeam();
disruptions.forEach((d,i)=>setTimeout(()=>showDisruption(d,i),i*4000));
</script>
</body>
</html>
